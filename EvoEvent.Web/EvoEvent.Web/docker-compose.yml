# PostgreSQL для EvoEvent — совпадает с ConnectionStrings:DefaultConnection в appsettings.json
# Запуск из корня репозитория: docker compose up -d
# Остановка: docker compose down
# Данные сохраняются в именованном томе evoevent_pgdata

services:
  postgres:
    image: postgres:16-alpine
    container_name: evoevent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: qwerty123
      POSTGRES_DB: evoevent
    ports:
      - "5432:5432"
    volumes:
      - evoevent_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d evoevent"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  eventapi_pgdata:
